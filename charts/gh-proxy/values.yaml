# Default values for gh-proxy.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/vegidio/gh-maven-proxy
  pullPolicy: IfNotPresent
  tag: "26.3.0"

nameOverride: ""
fullnameOverride: ""

env:
  GITHUB_USER: ""
  GITHUB_TOKEN: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx" # Default value; must be overridden in the cluster
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # kubernetes.io/ingress.class: nginx
  hosts:
    - host: maven.vinicius.io
      paths:
        - path: /
          pathType: Prefix
  tls: []
